<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GoldSense Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: monospace; margin: 0; overflow: hidden; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .up { color: #00FF00; border-color: #00FF00; background: rgba(0, 255, 0, 0.1); }
        .down { color: #ff4444; border-color: #ff4444; }
    </style>
</head>
<body>
    <div class="p-5 safe-top min-h-screen flex flex-col">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-[10px] font-black text-[#00FF00] tracking-widest uppercase">XAUUSD Terminal</h1>
            <span id="status" class="text-[10px] font-bold text-yellow-500 uppercase">Syncing...</span>
        </div>
        
        <!-- Kurse -->
        <div class="grid grid-cols-2 gap-3 mb-6 text-center">
            <div class="bg-[#131722] p-5 rounded-3xl border border-[#2a2e39] shadow-xl">
                <div class="text-[9px] text-gray-500 font-bold uppercase mb-1 tracking-widest">Gold Price</div>
                <div id="gold" class="text-2xl font-black tracking-tighter text-[#00FF00]">$5,012.15</div>
            </div>
            <div class="bg-[#131722] p-5 rounded-3xl border border-[#2a2e39] shadow-xl">
                <div class="text-[9px] text-gray-500 font-bold uppercase mb-1 tracking-widest">DXY Index</div>
                <div id="dxy" class="text-2xl font-black text-white tracking-tighter">99.82</div>
            </div>
        </div>

        <!-- Signal -->
        <div id="signal-box" class="p-10 rounded-[2.5rem] border-2 border-gray-800 mb-6 text-center transition-all duration-500">
            <div id="signal-text" class="text-4xl font-black italic tracking-tighter leading-none text-gray-700 uppercase">Neutral</div>
            <div class="text-[9px] mt-4 text-gray-500 font-black uppercase tracking-[0.3em]">Strategy Engine v3.0</div>
        </div>

        <!-- Chart -->
        <div class="flex-grow rounded-[2rem] overflow-hidden border border-[#2a2e39] shadow-2xl relative mb-6">
            <iframe src="https://s.tradingview.com" width="100%" height="100%" frameBorder="0"></iframe>
        </div>
    </div>

    <script>
        // Variablen für Daten
        let currentGold = 5012.15;
        let currentDxy = 99.82;

        const goldEl = document.getElementById('gold');
        const dxyEl = document.getElementById('dxy');
        const statusEl = document.getElementById('status');
        const signalBox = document.getElementById('signal-box');
        const signalText = document.getElementById('signal-text');

        // WebSocket Verbindung
        function connect() {
            const ws = new WebSocket('wss://://stream.binance.com');

            ws.onopen = () => {
                statusEl.innerText = 'Live ●';
                statusEl.style.color = '#00FF00';
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.c) {
                    const newGold = parseFloat(data.c);
                    
                    // Gold Update
                    goldEl.innerText = '$' + newGold.toLocaleString(undefined, {minimumFractionDigits: 2});
                    
                    // DXY Update (Simulation)
                    currentDxy = 99.82 + (Math.random() - 0.5) * 0.04;
                    dxyEl.innerText = currentDxy.toFixed(2);

                    // Strategie Logik
                    if (currentDxy < 99.85) {
                        signalBox.classList.add('up');
                        signalText.innerText = 'Strong Buy';
                        signalText.style.color = '#00FF00';
                    } else {
                        signalBox.classList.remove('up');
                        signalText.innerText = 'Neutral';
                        signalText.style.color = '#374151';
                    }
                }
            };

            ws.onclose = () => {
                statusEl.innerText = 'Reconnecting...';
                statusEl.style.color = '#ffcc00';
                setTimeout(connect, 3000);
            };
        }

        // Start
        connect();
    </script>
</body>
</html>
